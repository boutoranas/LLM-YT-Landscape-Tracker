name: Tracker Heartbeat

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Provide credentials
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$SERVICE_ACCOUNT_JSON" > service_account.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/service_account.json" >> "$GITHUB_ENV"
          fi

      - name: Run tracker
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
        run: python tracker.py

      - name: Upload data snapshot
        uses: actions/upload-artifact@v4
        with:
          name: data-json
          path: data.json

      - name: Prepare site for Pages
        run: |
          mkdir -p public
          cp index.html public/
          cp data.json public/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: public
